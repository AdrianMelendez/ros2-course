# docker-compose.yml — generated by ros2-dockergen v1.2.0
services:
  ros2-humble:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: ros2-humble-ros2-humble:latest
    container_name: ros2-humble
    hostname: ros2-humble
    stdin_open: true
    tty: true
    restart: unless-stopped
    network_mode: host
    environment:
      - ROS_DISTRO=humble
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
      - GAZEBO_PLUGIN_PATH=$GAZEBO_PLUGIN_PATH:/opt/ros/humble/lib
      - TURTLEBOT3_MODEL=waffle_pi
    volumes:
      - .:/home/adml/ros2_ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:rw
